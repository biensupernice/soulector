name: Fetch Soulection Episode Tracks

on:
  workflow_dispatch:
    inputs:
      start_episode:
        description: "Only fetch tracks for episodes at or above this show number"
        required: false
        default: "650"
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch missing episode tracks from radio.soulection.com
        env:
          SOULECTOR_BASE_URL: https://soulector.app
        run: node scripts/fetch-soulection-episode-tracks.mjs ${{ inputs.start_episode }}

      - name: Upload episode tracks JSON
        uses: actions/upload-artifact@v4
        with:
          name: soulection-episode-tracks
          path: data/soulection-episode-tracks.json
          retention-days: 90

      - name: Print run ID for import step
        run: |
          echo ""
          echo "========================================"
          echo "  Run ID: ${{ github.run_id }}"
          echo "  Pass this to the Import workflow's"
          echo "  fetch_run_id input (or leave blank"
          echo "  to auto-use the latest fetch run)."
          echo "========================================"
