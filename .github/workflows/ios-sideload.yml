name: iOS Sideload Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ios/**"
      - ".github/workflows/ios-sideload.yml"
  # PRs get the same build (IPA attached as a run artifact) but never touch
  # the rolling sideload release — that only tracks main.
  pull_request:
    branches:
      - main
    paths:
      - "ios/**"
      - ".github/workflows/ios-sideload.yml"

concurrency:
  group: ios-sideload-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -project ios/Soulector.xcodeproj \
            -scheme Soulector \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Soulector.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R "build/Soulector.xcarchive/Products/Applications/Soulector.app" build/Payload/
          cd build
          zip -qry Soulector.ipa Payload

      - name: Upload build artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: Soulector-ipa
          path: build/Soulector.ipa

      # The iOS equivalent of the Vercel preview comment: a sticky PR comment
      # linking this PR's IPA, updated in place on every push. Skipped for
      # fork PRs, whose token can't write comments.
      - name: Link build on PR
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = "<!-- ios-sideload-build -->";
            const body = [
              marker,
              "📱 **iOS build ready**",
              "",
              `[Download Soulector.ipa](${process.env.ARTIFACT_URL}) — unsigned, for SideStore, built from ${process.env.HEAD_SHA}.`,
              "",
              "_Downloading requires being signed in to GitHub. The link is refreshed on every push and expires with the run's artifact retention._",
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

      - name: Publish rolling release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sideload-latest
          name: Soulector iOS (latest sideload build)
          body: |
            Unsigned IPA for sideloading with SideStore.

            Built from `${{ github.sha }}` on `${{ github.ref_name }}`.

            **Install on iPhone:** download `Soulector.ipa` below in Safari,
            then open SideStore → My Apps → + → pick the downloaded file.
          files: build/Soulector.ipa
