name: Import Episode Tracks

on:
  workflow_dispatch:
    inputs:
      fetch_run_id:
        description: >
          Run ID from a previous "Fetch Soulection Episodes" workflow run.
          Leave empty to use data/soulection-episodes.json committed in the repo.
        required: false
        type: string
      start_episode:
        description: >
          Episode number used in the fetch run (needed to find the right artifact).
          Only used when fetch_run_id is provided.
        required: false
        default: "650"
        type: string
      dry_run:
        description: "Preview which episodes would be imported without making any changes"
        required: false
        default: false
        type: boolean

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download episodes artifact from fetch run
        if: ${{ inputs.fetch_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: soulection-episodes-${{ inputs.start_episode }}-plus
          run-id: ${{ inputs.fetch_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: data/

      - name: Import episode tracks
        env:
          SOULECTOR_BASE_URL: https://soulector.app
          INTERNAL_AUTH_USERNAME: ${{ secrets.INTERNAL_AUTH_USERNAME }}
          INTERNAL_AUTH_PASSWORD: ${{ secrets.INTERNAL_AUTH_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node scripts/import-episode-tracks.mjs data/soulection-episodes.json
